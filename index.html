function buildShop(wDays,adults,children){const p=adults+children*0.6;const pd={};wDays.forEach(d=>{pd[d.phase]=(pd[d.phase]||0)+1;});const m={};Object.entries(pd).forEach(([ph,days])=>{ING[ph].forEach(cat=>{cat.items.forEach(item=>{const k=item.name+"_"+item.unit;if(!m[k])m[k]={name:item.name,unit:item.unit,qty:0,cat:cat.cat};m[k].qty+=item.qty*days*p;});});});const bc={};Object.values(m).forEach(it=>{if(!bc[it.cat])bc[it.cat]=[];bc[it.cat].push(it);});return bc;}

function getPhase(dateStr,len){if(!dateStr)return null;const s=new Date(dateStr);s.setHours(0,0,0,0);const t=new Date();t.setHours(0,0,0,0);const diff=Math.round((t-s)/86400000);const day=(diff%len)+1;const phase=day<=5?"menstrual":day<=13?"follicular":day<=16?"ovulation":"luteal";const nextDay=phase==="menstrual"?6:phase==="follicular"?14:phase==="ovulation"?17:len+1;const np=new Date(s);np.setDate(s.getDate()+len);return{phase,day,daysLeft:Math.max(nextDay-day,0),data:PH_DATA[phase],cycleLen:len,nextPeriod:np,daysToNext:Math.max(0,Math.round((np-t)/86400000))};}

// ── CicloTab ───────────────────────────────────────────────────────────────
function CicloTab({pi,setLP,setCL,dailyLog,setDailyLog}){
  const [sub,setSub]=useState("ciclo");
  const d=pi?.data;
  const today=new Date().toISOString().split("T")[0];
  const todayLog=dailyLog[today]||{};
  const now=new Date();
  const yr=now.getFullYear(),mo=now.getMonth();
  const dIM=new Date(yr,mo+1,0).getDate();
  const sw=new Date(yr,mo,1).getDay();

  function getDayPhase(dn){
    if(!pi)return null;
    const date=new Date(yr,mo,dn);
    const s=new Date(pi.nextPeriod);s.setDate(s.getDate()-pi.cycleLen);
    const diff=Math.round((date-s)/86400000);
    const dc=((diff%pi.cycleLen)+pi.cycleLen)%pi.cycleLen+1;
    if(dc<1||dc>pi.cycleLen)return null;
    return dc<=5?"menstrual":dc<=13?"follicular":dc<=16?"ovulation":"luteal";
  }

  function saveLog(update){
    const upd={...dailyLog,[today]:{...todayLog,...update}};
    setDailyLog(upd);lsSet("meirins_diary",upd);
  }

  return(
    <div>
      <SubTabs tabs={[{id:"ciclo",l:"Ciclo"},{id:"calendario",l:"Calendario"},{id:"diario",l:"📓 Diario"}]} active={sub} set={setSub}/>

        <Card style={{textAlign:"center",padding:"22px 16px"}}>
          <svg width={200} height={200} viewBox="0 0 200 200" style={{display:"block",margin:"0 auto 12px"}}>
            {[{ph:"menstrual",s:0,e:5/28},{ph:"follicular",s:5/28,e:13/28},{ph:"ovulation",s:13/28,e:16/28},{ph:"luteal",s:16/28,e:1}].map(({ph,s,e})=>{
              const r=75,cx=100,cy=100,a1=s*2*Math.PI-Math.PI/2,a2=e*2*Math.PI-Math.PI/2;
              const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
              return <path key={ph} d={`M${cx} ${cy}L${x1} ${y1}A${r} ${r} 0 ${(e-s)>.5?1:0} 1 ${x2} ${y2}Z`} fill={ph===pi?.phase?PH_DATA[ph].color:PH_DATA[ph].light} stroke="#fff" strokeWidth={2.5}/>;
            })}
            <circle cx={100} cy={100} r={55} fill="#fff"/>
            {pi&&(()=>{const r=75,cx=100,cy=100,a=((pi.day-1)/pi.cycleLen)*2*Math.PI-Math.PI/2;return <circle cx={cx+r*Math.cos(a)} cy={cy+r*Math.sin(a)} r={9} fill={d?.color} stroke="#fff" strokeWidth={2.5}/>;})()}

          </svg>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800,color:d?.color}}>{d?.emoji} Fase {d?.name}</div>
          <div style={{fontSize:12,color:C.text2,marginTop:4}}>{d?.tagline} · {pi?.daysLeft} días restantes</div>
          <div style={{marginTop:10,background:d?.light,borderRadius:10,padding:"7px 14px",display:"inline-block",fontSize:12}}>
            <span style={{color:d?.color,fontWeight:700}}>📅 Próxima regla: </span>
            <span style={{color:C.text2}}>{pi?.nextPeriod?.toLocaleDateString("es-ES",{day:"numeric",month:"long"})} ({pi?.daysToNext}d)</span>
          </div>
        </Card>

        {Object.entries(PH_DATA).map(([key,ph])=>{
          const isA=key===pi?.phase;
          const pD={menstrual:"Días 1–5",follicular:"Días 6–13",ovulation:"Días 14–16",luteal:`Días 17–${pi?.cycleLen||28}`};

                {isA&&<span style={{background:ph.color,color:"#fff",fontSize:9,padding:"4px 10px",borderRadius:20,fontWeight:800}}>HOY</span>}
              </Row>
              {isA&&<div style={{fontSize:12,color:C.text2,marginTop:10,lineHeight:1.7}}>{ph.desc}</div>}
            </Card>
          );
        })}

        <Card style={{border:`2px dashed ${C.borderL}`}}>
          <EditCycle pi={pi} setLP={setLP} setCL={setCL}/>

      </div>}

      {sub==="calendario"&&<div>

            {Array.from({length:sw},(_,i)=><div key={"e"+i}/>)}

              const dn=i+1;const ph=getDayPhase(dn);const isT=dn===now.getDate();
              const ds=`${yr}-${String(mo+1).padStart(2,"0")}-${String(dn).padStart(2,"0")}`;
              const lg=dailyLog[ds];
              return(
                <div key={dn} style={{aspectRatio:"1",borderRadius:9,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:isT?(ph?PH_DATA[ph].color:C.blue):ph?PH_DATA[ph].light:C.bg,position:"relative"}}>

                  {lg?.flow>0&&<div style={{position:"absolute",bottom:2,width:4,height:4,borderRadius:2,background:isT?"rgba(255,255,255,.8)":"#DC2626"}}/>}
                </div>
              );
            })}
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:12}}>
            {Object.entries(PH_DATA).map(([k,ph])=>(
              <span key={k} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:ph.color,fontWeight:600}}>
                <div style={{width:8,height:8,borderRadius:4,background:ph.color}}/>{ph.name}
              </span>
            ))}
          </div>
        </Card>
      </div>}

      {sub==="diario"&&<div>
        <Card style={{background:C.blueL,border:`1.5px solid ${C.blue}22`}}>
          <div style={{fontSize:10,color:C.blue,fontWeight:800,letterSpacing:1,marginBottom:4}}>HOY · {new Date().toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long"})}</div>

                <span style={{fontSize:22}}>{m.i}</span>
                <span style={{fontSize:9,color:todayLog.mood===m.id?C.blue:C.text3,fontWeight:todayLog.mood===m.id?700:400}}>{m.l}</span>

          <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:12}}>🩸 Flujo menstrual</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {FLOW.map(f=>(

                {f.l}

        <Card>
          <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:12}}>🩺 Síntomas</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {SYMPTOMS.map(s=>{const a=(todayLog.symptoms||[]).includes(s.id);return(

function EditCycle({pi,setLP,setCL}){
  const [ed,setEd]=useState(false);
  const [d,setD]=useState("");
  const [l,setL]=useState(pi?.cycleLen||28);
  const today=new Date().toISOString().split("T")[0];
  if(!ed)return <button onClick={()=>setEd(true)} style={{width:"100%",background:"none",border:"none",fontSize:13,color:C.text2,cursor:"pointer",padding:4}}>✏️ Actualizar fecha o duración del ciclo</button>;
  return(
    <div>
      <div style={{fontSize:13,fontWeight:700,marginBottom:12,color:C.text}}>Actualizar ciclo</div>
      <label style={{fontSize:11,color:C.text2,display:"block",marginBottom:4}}>Inicio última regla</label>
      <input type="date" value={d} onChange={e=>setD(e.target.value)} max={today} style={{width:"100%",padding:"10px 12px",borderRadius:10,border:`1.5px solid ${C.border}`,fontSize:14,boxSizing:"border-box",marginBottom:12,outline:"none"}}/>
      <label style={{fontSize:11,color:C.text2,display:"block",marginBottom:4}}>Duración: <strong>{l} días</strong></label>
      <input type="range" min={21} max={35} value={l} onChange={e=>setL(+e.target.value)} style={{width:"100%",marginBottom:14,accentColor:C.blue}}/>
      <Row style={{gap:8}}>
        <button onClick={()=>setEd(false)} style={{flex:1,padding:10,borderRadius:10,border:`1px solid ${C.borderL}`,background:"#fff",cursor:"pointer",fontSize:14}}>Cancelar</button>
        <button onClick={()=>{if(d){setLP(d);setCL(l);}setEd(false);}} style={{flex:1,padding:10,borderRadius:10,border:"none",background:C.blue,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:14}}>Guardar</button>
      </Row>
    </div>
  );
}

// ── NutriTab ───────────────────────────────────────────────────────────────
function NutriTab({d,pi,dailyLog,setDailyLog}){
  const [sub,setSub]=useState("hoy");
  const [adults,setAdults]=useState(1);
  const [children,setChildren]=useState(0);
  const [openM,setOpenM]=useState(null);
  const [openD,setOpenD]=useState(null);
  const [recipe,setRecipe]=useState(null);
  const [checked,setChecked]=useState({});
  const [dl,setDl]=useState(false);
  const today=new Date().toISOString().split("T")[0];
  const todayLog=dailyLog[today]||{};
  const water=todayLog.water||0;
  const WG=8;

  function saveW(n){const upd={...dailyLog,[today]:{...todayLog,water:Math.max(0,Math.min(WG,n))}}; setDailyLog(upd);lsSet("meirins_diary",upd);}

  const wDays=useMemo(()=>{
    if(!pi)return[];
    const ns=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
    return Array.from({length:7},(_,i)=>{
      const date=new Date();date.setDate(date.getDate()+i);
      const cd=((pi.day-1+i)%pi.cycleLen)+1;
      const ph=cd<=5?"menstrual":cd<=13?"follicular":cd<=16?"ovulation":"luteal";
      return{date,lbl:i===0?"Hoy":i===1?"Mañana":ns[date.getDay()],num:date.getDate(),ph,pd:PH_DATA[ph]};
    });
  },[pi]);

  const shop=useMemo(()=>buildShop(wDays,adults,children),[wDays,adults,children]);
  const total=adults+children;

      {sub==="semana"&&<div>

                    <Row style={{gap:8,marginBottom:8}}>
                      <div style={{width:34,height:34,borderRadius:10,background:day.pd.light,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{meal.ico}</div>

                        <div style={{fontSize:9,color:day.pd.color,fontWeight:800,textTransform:"uppercase",letterSpacing:1}}>{meal.t}</div>

                      </div>
                    </Row>
                    <div style={{background:"#fff",borderRadius:10,padding:"8px 10px",marginBottom:8}}>
                      {meal.items.map(it=>(
                        <div key={it} style={{display:"flex",gap:8,alignItems:"center",fontSize:12,color:C.text2,padding:"4px 0",borderBottom:`1px solid ${C.bg}`}}>

                    {meal.recipe&&<button onClick={e=>{e.stopPropagation();setRecipe({meal:meal.t,title:meal.title,...meal.recipe});}} style={{padding:"7px 14px",borderRadius:10,border:`2px solid ${day.pd.color}`,background:day.pd.light,color:day.pd.color,fontWeight:700,cursor:"pointer",fontSize:12}}>👩‍🍳 Ver receta</button>}
                  </div>

              </div>

        ))}

      {sub==="agua"&&<div>
        <div style={{background:`linear-gradient(135deg,#0C4A6E,#0891B2)`,borderRadius:20,padding:"28px 18px",marginBottom:12,color:"#fff",textAlign:"center"}}>
          <div style={{fontSize:9,opacity:.65,fontWeight:700,letterSpacing:2,marginBottom:8}}>AGUA DEL DÍA</div>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:60,fontWeight:800,lineHeight:1}}>{water}</div>
          <div style={{fontSize:16,opacity:.75,marginBottom:4}}>/ {WG} vasos · {water*250}ml</div>
          <div style={{height:7,background:"rgba(255,255,255,.2)",borderRadius:4,margin:"14px 0 10px",overflow:"hidden"}}>
            <div style={{height:"100%",width:`${(water/WG)*100}%`,background:"#fff",borderRadius:4,transition:"width .3s"}}/>
          </div>
          <div style={{fontSize:12,opacity:.65}}>{water>=WG?"🎉 ¡Meta alcanzada!":water>=WG/2?"¡Vas muy bien! 💪":"Sigue hidratándote 💧"}</div>

          <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:14}}>💧 Registra tus vasos</div>

            <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:C.text}}>{cat}</div>

              <Row key={k} style={{justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${C.bg}`}}>

          {dl?"✓ ¡Descargado!":"⬇ Descargar lista (.txt)"}
        </button>
      </div>}
    </div>
  );
}

// ── EntrenoTab ─────────────────────────────────────────────────────────────
function EntrenoTab({d,pi,trainDays,wLog,setWLog}){
  const [sub,setSub]=useState("hoy");
  const [extra,setExtra]=useState("");
  const [adding,setAdding]=useState(false);
  const [expDay,setExpDay]=useState(null);
  const todayJS=new Date();
  const todayKey=todayJS.toISOString().split("T")[0];
  const todayDow=todayJS.getDay();
  const isTrain=trainDays.includes(todayDow);
  const todayW=d?.week[jsToIdx[todayDow]];
  const todayLog=wLog[todayKey];

  function saveLog(u){const up={...wLog,[todayKey]:u};setWLog(up);lsSet("meirins_gym",up);}

  const wDays=Array.from({length:7},(_,i)=>{
    const date=new Date();date.setDate(date.getDate()+i);
    const dow=date.getDay();const wIdx=jsToIdx[dow];
    const cd=((pi.day-1+i)%pi.cycleLen)+1;const ph=cd<=5?"menstrual":cd<=13?"follicular":cd<=16?"ovulation":"luteal";
    const dk=date.toISOString().split("T")[0];
    return{date,dow,isTrain:trainDays.includes(dow),wIdx,ph,pd:PH_DATA[ph],log:wLog[dk],dk,num:date.getDate(),lbl:i===0?"Hoy":i===1?"Mañana":DAY_L[dow]};
  });

  const ExtraSection=()=>(
    <Card>
      <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>➕ {isTrain?"Actividad extra":"¿Has hecho algo? Regístralo"}</div>
      {todayLog?.extraSport?(
        <Row style={{justifyContent:"space-between",padding:"10px 12px",background:"#F0FDF4",borderRadius:10}}>
          <span style={{fontSize:13,color:"#166534",fontWeight:600}}>🏅 {todayLog.extraSport}</span>
          <button onClick={()=>saveLog({...todayLog,extraSport:""})} style={{background:"none",border:"none",color:C.text3,cursor:"pointer",fontSize:18}}>×</button>
        </Row>
      ):adding?(
        <Row style={{gap:8}}>
          <input value={extra} onChange={e=>setExtra(e.target.value)} placeholder="Ej: Tenis 1h, Pádel 90min..." style={{flex:1,padding:"10px 12px",borderRadius:10,border:`2px solid ${C.borderL}`,fontSize:13,outline:"none"}}/>
          <button onClick={()=>{saveLog({...(todayLog||{status:"done"}),extraSport:extra});setAdding(false);setExtra("");}} style={{padding:"10px 16px",borderRadius:10,border:"none",background:C.blue,color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13}}>+</button>
        </Row>
      ):(
        <button onClick={()=>setAdding(true)} style={{width:"100%",padding:10,borderRadius:12,border:`2px dashed ${C.border}`,background:"#fff",color:C.text2,cursor:"pointer",fontSize:13}}>+ Añadir deporte o actividad</button>
      )}
    </Card>
  );

  return(
    <div>
      <SubTabs tabs={[{id:"hoy",l:"Hoy"},{id:"semana",l:"Semana"}]} active={sub} set={setSub}/>

      {sub==="hoy"&&<div>
        <Card style={{background:d?.light,border:`1.5px solid ${d?.color}22`}}>
          <Row style={{justifyContent:"space-between",marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:800,color:d?.color}}>⚡ Fase {d?.name} · {d?.intensity}</div>
          </Row>
          <div style={{height:6,background:"rgba(0,0,0,.07)",borderRadius:3,marginBottom:8,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${d?.intensityPct}%`,background:d?.color,borderRadius:3}}/>
          </div>
          <div style={{fontSize:12,color:C.text2,fontStyle:"italic",lineHeight:1.6}}>{d?.tip}</div>
        </Card>

        {isTrain?(
          <div>
            <Card>
              <Row style={{justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
                <div>
                  <div style={{fontSize:9,color:C.blue,fontWeight:800,letterSpacing:1.5,marginBottom:6}}>SESIÓN DE HOY</div>
                  <div style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,color:C.text}}>{todayW?.ico} {todayW?.name}</div>
                  {todayW?.dur&&<div style={{fontSize:12,color:C.text2,marginTop:4}}>⏱ {todayW.dur}</div>}
                </div>
                {todayLog&&<span style={{padding:"6px 14px",borderRadius:20,fontSize:12,fontWeight:800,background:todayLog.status==="done"?"#DCFCE7":"#FEE2E2",color:todayLog.status==="done"?"#16A34A":"#DC2626",flexShrink:0}}>{todayLog.status==="done"?"✓ Hecho":"✗ Saltado"}</span>}
              </Row>
              {todayW?.exercises?.length>0&&<div style={{marginBottom:14}}>
                {todayW.exercises.map((ex,i)=>(
                  <Row key={i} style={{justifyContent:"space-between",padding:"10px 12px",borderRadius:12,background:i%2===0?C.bg:"#fff",marginBottom:4}}>
                    <Row style={{gap:10}}>
                      <div style={{width:24,height:24,borderRadius:12,background:C.blueL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:C.blue,flexShrink:0}}>{i+1}</div>
                      <span style={{fontSize:13,fontWeight:500,color:C.text}}>{ex.name}</span>
                    </Row>
                    <span style={{fontSize:12,color:C.blue,fontWeight:700,flexShrink:0,marginLeft:8}}>{ex.sets&&ex.reps?`${ex.sets}×${ex.reps}`:ex.sets&&ex.dur?`${ex.sets}×${ex.dur}`:ex.dur||""}</span>

              {!todayLog&&<Row style={{gap:8}}>
                <button onClick={()=>saveLog({status:"done",extraSport:""})} style={{flex:1,padding:12,borderRadius:12,border:"none",background:"#16A34A",color:"#fff",fontWeight:800,cursor:"pointer",fontSize:14}}>✓ Completada</button>
                <button onClick={()=>saveLog({status:"skipped",extraSport:""})} style={{flex:1,padding:12,borderRadius:12,border:"none",background:"#EF4444",color:"#fff",fontWeight:800,cursor:"pointer",fontSize:14}}>✗ No pude</button>

              {todayLog&&<button onClick={()=>{const u={...wLog};delete u[todayKey];setWLog(u);lsSet("meirins_gym",u);}} style={{width:"100%",padding:9,borderRadius:12,border:`2px solid ${C.borderL}`,background:"#fff",color:C.text2,cursor:"pointer",fontSize:13,marginTop:8}}>Deshacer registro</button>}
            </Card>
            <ExtraSection/>
          </div>
        ):(
          <div>
            <Card style={{textAlign:"center",padding:28}}>
              <div style={{fontSize:52,marginBottom:12}}>😴</div>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,color:C.text,marginBottom:8}}>Día de descanso</div>
              <div style={{fontSize:13,color:C.text2,lineHeight:1.65}}>El descanso es parte esencial del progreso.</div>
            </Card>
            <ExtraSection/>
          </div>
        )}
      </div>}

      {sub==="semana"&&<div>
        <Card>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:800,marginBottom:14,color:C.text}}>📅 Tu semana</div>
          {wDays.map((day,i)=>{
            const w=d?.week[day.wIdx];const st=day.log?.status;const exp=expDay===i;
            return(
              <div key={i} style={{borderRadius:14,background:i===0?C.blueL:day.isTrain?C.bg:"#fff",border:`2px solid ${i===0?C.blue:C.borderL}`,marginBottom:8,overflow:"hidden"}}>
                <Row style={{gap:10,padding:"12px 14px",cursor:"pointer"}} onClick={()=>setExpDay(exp?null:i)}>

                    <div style={{fontSize:18,fontWeight:800,color:C.text,lineHeight:1}}>{day.num}</div>
                  </div>
                  <span style={{fontSize:20,flexShrink:0}}>{day.isTrain?w?.ico:"😴"}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:day.isTrain?700:400,color:day.isTrain?C.text:C.text3}}>{day.isTrain?w?.name:"Descanso"}</div>
                    {day.isTrain&&w?.dur&&<div style={{fontSize:10,color:C.text3}}>⏱ {w.dur}</div>}

                    {st==="done"&&<span style={{fontSize:13,color:"#16A34A",fontWeight:800}}>✓</span>}
                    {st==="skipped"&&<span style={{fontSize:13,color:"#EF4444",fontWeight:800}}>✗</span>}
                    {st==="extra"&&<span style={{fontSize:13}}>🏅</span>}
                    <Chevron open={exp}/>
                  </Row>
                </Row>
                {exp&&day.isTrain&&w?.exercises?.length>0&&(
                  <div style={{padding:"0 14px 14px",borderTop:`1px solid ${C.borderL}`}}>
                    {w.exercises.map((ex,ei)=>(
                      <Row key={ei} style={{justifyContent:"space-between",padding:"8px 0",fontSize:12,borderBottom:`1px solid ${C.bg}`,color:C.text2}}>
                        <span>{ei+1}. {ex.name}</span>
                        <span style={{fontWeight:700,color:C.blue,flexShrink:0,marginLeft:8}}>{ex.sets&&ex.reps?`${ex.sets}×${ex.reps}`:ex.dur||""}</span>
                      </Row>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </Card>
      </div>}
    </div>
  );
}

// ── IATab ──────────────────────────────────────────────────────────────────
function IATab({pi,goals,dailyLog}){
  const [msgs,setMsgs]=useState([]);
  const [inp,setInp]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState(null);
  const bottomRef=useRef(null);
  const d=pi?.data;
  const today=new Date().toISOString().split("T")[0];
  const tl=dailyLog[today]||{};

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[msgs]);

  const sys=`Eres Meirins, asistente experta en salud hormonal femenina, nutrición adaptada al ciclo y entrenamiento.
CONTEXTO: Fase ${d?.name} (${d?.tagline}) · Día ${pi?.day}/${pi?.cycleLen} · ${pi?.daysLeft} días restantes · Regla en ${pi?.daysToNext}d
Intensidad: ${d?.intensity} (${d?.intensityPct}%) · Nutrientes clave: ${d?.focus?.join(", ")} · Kcal: ${d?.kcal}
Objetivos: ${goals.join(", ")} · Estado: ${tl.mood||"—"} · Síntomas: ${tl.symptoms?.join(", ")||"ninguno"} · Energía: ${tl.energy||"—"}/5 · Agua: ${tl.water||0}/8
INSTRUCCIONES: Responde en español, con calidez. Usa emojis. Máx 200 palabras. No des consejos médicos específicos.`;

  const quick=["¿Qué como antes de entrenar hoy?","¿Puedo hacer HIIT en mi fase?","Tengo antojos de dulce 🍫","¿Cómo está mi energía esta semana?","Cuéntame sobre mi fase actual","Plan de comidas para mañana"];

  async function send(text){
    if(!text.trim()||loading)return;
    const um={role:"user",content:text};
    const nm=[...msgs,um];
    setMsgs(nm);setInp("");setLoading(true);setErr(null);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages:nm.map(m=>({role:m.role,content:m.content}))})});
      const data=await res.json();
      if(data.content?.[0]?.text)setMsgs([...nm,{role:"assistant",content:data.content[0].text}]);
      else setErr("Sin respuesta. Inténtalo de nuevo.");
    }catch{setErr("Error de conexión.");}
    finally{setLoading(false);}
  }

  return(
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 220px)"}}>
      {msgs.length===0&&(
        <div>
          <div style={{background:d?.gradient,borderRadius:20,padding:"18px 16px",marginBottom:12,color:"#fff"}}>
            <div style={{fontSize:9,opacity:.65,fontWeight:700,letterSpacing:2,marginBottom:6}}>✨ ASISTENTE IA</div>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,marginBottom:4}}>Hola, soy Meirins ⚡</div>
            <div style={{fontSize:13,opacity:.85,lineHeight:1.65}}>Estoy aquí para ayudarte con nutrición, entrenamiento y bienestar adaptados a tu fase <strong>{d?.name}</strong>.</div>
          </div>
          <div style={{fontSize:10,color:C.text3,marginBottom:8,fontWeight:700,letterSpacing:1}}>PREGUNTAS FRECUENTES</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
            {quick.map(q=><button key={q} onClick={()=>send(q)} style={{padding:"8px 14px",borderRadius:20,border:`2px solid ${C.border}`,background:C.blueL,color:C.blue,fontSize:12,fontWeight:600,cursor:"pointer"}}>{q}</button>)}
          </div>
        </div>
      )}

      <div style={{flex:1,overflowY:"auto",marginBottom:12}}>
        {msgs.map((m,i)=>(
          <Row key={i} style={{justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:10,alignItems:"flex-end"}}>
            {m.role==="assistant"&&<div style={{width:28,height:28,borderRadius:14,background:d?.gradient,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0,marginRight:7}}>⚡</div>}
            <div style={{maxWidth:"82%",padding:"11px 14px",borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",background:m.role==="user"?C.blue:"#fff",color:m.role==="user"?"#fff":C.text,fontSize:13,lineHeight:1.65,boxShadow:"0 2px 12px rgba(26,86,219,.08)",border:m.role==="assistant"?`1px solid ${C.borderL}`:"none"}}>{m.content}</div>
          </Row>
        ))}
        {loading&&<Row style={{justifyContent:"flex-start",marginBottom:10,alignItems:"flex-end"}}>
          <div style={{width:28,height:28,borderRadius:14,background:d?.gradient,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0,marginRight:7}}>⚡</div>
          <div style={{padding:"11px 16px",borderRadius:"18px 18px 18px 4px",background:"#fff",border:`1px solid ${C.borderL}`,display:"flex",gap:4,alignItems:"center"}}>
            <span className="dot"/><span className="dot"/><span className="dot"/>
          </div>
        </Row>}
        {err&&<div style={{background:"#FEF2F2",border:"1px solid #FEE2E2",borderRadius:12,padding:"10px 14px",fontSize:13,color:"#DC2626",marginBottom:8}}>{err}</div>}
        <div ref={bottomRef}/>
      </div>

      <Row style={{gap:8,padding:"4px 0"}}>
        <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send(inp)}
          placeholder="Pregúntame sobre tu ciclo, nutrición o entreno..."
          style={{flex:1,padding:"12px 16px",borderRadius:50,border:`2px solid ${C.border}`,fontSize:13,outline:"none",background:"#fff"}}/>
        <button onClick={()=>send(inp)} disabled={!inp.trim()||loading} style={{width:46,height:46,borderRadius:23,border:"none",background:inp.trim()&&!loading?C.blue:C.borderL,color:"#fff",fontSize:18,cursor:inp.trim()&&!loading?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .2s"}}>➤</button>
      </Row>
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────
function App(){
  const sv=lsGet("meirins")||{};
  const [isSetup,setSetup]=useState(!sv.lastPeriod);
  const [tab,setTab]=useState("home");
  const [showCfg,setShowCfg]=useState(false);
  const [lp,setLpS]=useState(sv.lastPeriod||"");
  const [cl,setClS]=useState(sv.cycleLength||28);
  const [td,setTdS]=useState(sv.trainDays||[1,2,4,5]);
  const [goals,setGoalsS]=useState(sv.goals||["bienestar"]);
  const [diet,setDietS]=useState(sv.diet||["sin_lactosa"]);
  const [wLog,setWLog]=useState(lsGet("meirins_gym")||{});
  const [dLog,setDLog]=useState(lsGet("meirins_diary")||{});
  const [dbOk,setDbOk]=useState(null); // null=loading, true=ok, false=offline

  // Load from Supabase on startup
  useEffect(()=>{
    loadFromSupabase().then(ok=>{
      setDbOk(ok);
      if(ok){
        // Reload state from localStorage after Supabase sync
        const fresh=lsGet("meirins")||{};
        if(fresh.lastPeriod){
          setLpS(fresh.lastPeriod);
          setClS(fresh.cycleLength||28);
          setTdS(fresh.trainDays||[1,2,4,5]);
          setGoalsS(fresh.goals||["bienestar"]);
          setDietS(fresh.diet||["sin_lactosa"]);
          setSetup(false);
        }
        setDLog(lsGet("meirins_diary")||{});
        setWLog(lsGet("meirins_gym")||{});
      }
    });
    setTimeout(()=>{const s=document.getElementById("splash");if(s)s.classList.add("hide");},900);
  },[]);

  function persist(p,c,t,g,d){
    const data={lastPeriod:p,cycleLength:c,trainDays:t,goals:g,diet:d};
    lsSet("meirins",data);
    syncProfile(data); // sync to Supabase async
  }
  const setLP=v=>{setLpS(v);persist(v,cl,td,goals,diet);};
  const setCL=v=>{setClS(v);persist(lp,v,td,goals,diet);};
  const setGoals=v=>{const val=typeof v==="function"?v(goals):v;setGoalsS(val);persist(lp,cl,td,val,diet);};
  const setDiet=v=>{const val=typeof v==="function"?v(diet):v;setDietS(val);persist(lp,cl,td,goals,val);};
  const setTd=v=>{const val=typeof v==="function"?v(td):v;setTdS(val);persist(lp,cl,val,goals,diet);};

  // Enhanced setDailyLog that also syncs to Supabase
  function setDailyLogSync(updater){
    setDLog(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      lsSet("meirins_diary",next);
      // Sync only the changed date
      const today=new Date().toISOString().split("T")[0];
      if(next[today])syncDailyLog(today,next[today]);
      return next;
    });
  }

  // Enhanced setWLog that also syncs to Supabase
  function setWLogSync(updater){
    setWLog(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      lsSet("meirins_gym",next);
      // Sync only the changed date
      const today=new Date().toISOString().split("T")[0];
      if(next[today])syncWorkoutLog(today,next[today]);
      return next;
    });
  }

  const pi=lp?getPhase(lp,cl):null;
  const d=pi?.data;
  const todayWater=dLog[new Date().toISOString().split("T")[0]]?.water||0;

  if(isSetup)return <Setup done={(date,len,t,g,di)=>{setLpS(date);setClS(len);setTdS(t);setGoalsS(g);setDietS(di);persist(date,len,t,g,di);setSetup(false);}}/>;

  const tabs=[{id:"home",i:"🏠",l:"Inicio"},{id:"ciclo",i:"🌙",l:"Ciclo"},{id:"nutri",i:"🥗",l:"Nutrición"},{id:"gym",i:"🏋️",l:"Entrena"},{id:"ia",i:"✨",l:"IA"}];

  return(
    <div style={{fontFamily:"'DM Sans',sans-serif",maxWidth:430,margin:"0 auto",minHeight:"100vh",display:"flex",flexDirection:"column",background:C.bg}}>
      {/* Header */}
      <div style={{background:d?.gradient||"linear-gradient(145deg,#0F1E4A,#1A56DB)",padding:"18px 18px 24px",color:"#fff",flexShrink:0}}>
        <Row style={{justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
          <div>
            <p style={{margin:0,fontSize:8,opacity:.55,letterSpacing:3,textTransform:"uppercase",fontWeight:700}}>
              MEIRINS {dbOk===true?"· DB ✓":dbOk===false?"· offline":""}
            </p>
            <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:24,margin:"4px 0 0",fontWeight:800,lineHeight:1.1}}>{d?.emoji} Fase {d?.name}</h1>
            <div style={{fontSize:11,opacity:.75,marginTop:3,fontStyle:"italic"}}>{d?.tagline}</div>
          </div>
          <Row style={{gap:8,alignItems:"flex-start"}}>
            <div style={{background:"rgba(255,255,255,.15)",borderRadius:14,padding:"8px 12px",textAlign:"center",backdropFilter:"blur(8px)"}}>
              <div style={{fontSize:26,fontWeight:800,lineHeight:1}}>{pi?.day}</div>
              <div style={{fontSize:8,opacity:.65,marginTop:2,letterSpacing:1}}>DÍA</div>
            </div>
            <button onClick={()=>setShowCfg(true)} style={{width:40,height:40,borderRadius:20,background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.2)",color:"#fff",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              ⚙️
            </button>
          </Row>
        </Row>
        <Row style={{gap:8}}>
          <div style={{flex:1,background:"rgba(255,255,255,.12)",borderRadius:10,padding:"7px 12px",backdropFilter:"blur(8px)"}}>
            <span style={{fontSize:11,opacity:.8}}>Quedan </span><strong style={{fontSize:11}}>{pi?.daysLeft} días</strong><span style={{fontSize:11,opacity:.8}}> · Regla en {pi?.daysToNext}d</span>
          </div>
          <div style={{background:"rgba(255,255,255,.12)",borderRadius:10,padding:"7px 12px",backdropFilter:"blur(8px)"}}>
            <span style={{fontSize:13}}>💧</span><strong style={{fontSize:12}}> {todayWater}/8</strong>
          </div>
        </Row>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto",padding:"16px 14px 90px"}}>
        {tab==="home"&&<HomeTab pi={pi} goals={goals} setTab={setTab}/>}
        {tab==="ciclo"&&<CicloTab pi={pi} setLP={setLP} setCL={setCL} dailyLog={dLog} setDailyLog={setDailyLogSync}/>}
        {tab==="nutri"&&<NutriTab d={d} pi={pi} dailyLog={dLog} setDailyLog={setDailyLogSync}/>}
        {tab==="gym"&&<EntrenoTab d={d} pi={pi} trainDays={td} wLog={wLog} setWLog={setWLogSync}/>}
        {tab==="ia"&&<IATab pi={pi} goals={goals} dailyLog={dLog}/>}
      </div>

      {/* Bottom nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"min(430px,100%)",background:"#fff",borderTop:`1px solid ${C.borderL}`,display:"flex",padding:"6px 0 20px",boxShadow:"0 -4px 24px rgba(26,86,219,.08)",zIndex:100}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"4px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <div style={{width:40,height:34,borderRadius:12,background:tab===t.id?C.blueL:"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .18s"}}>
              <span style={{fontSize:tab===t.id?20:18}}>{t.i}</span>
            </div>
            <span style={{fontSize:9,color:tab===t.id?C.blue:C.text3,fontWeight:tab===t.id?800:400}}>{t.l}</span>
            {tab===t.id&&<div style={{width:16,height:3,borderRadius:2,background:C.blue,marginTop:1}}/>}
          </button>
        ))}
      </div>

      {/* Settings */}
      {showCfg&&<Settings pi={pi} goals={goals} diet={diet} td={td} lastPeriod={lp} cycleLen={cl} onClose={()=>setShowCfg(false)} setLP={setLP} setCL={setCL} setGoals={setGoals} setDiet={setDiet} setTd={setTd} onReset={()=>{localStorage.clear();window.location.reload();}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<!-- ══ PWA: Service Worker + Update Banner ═══════════════════════════════ -->
<script>
(function() {
  // ── Register service worker ──
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').then(reg => {
        console.log('[Meirins] SW registered ✓', reg.scope);

        // Detect update available
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              showUpdateBanner(newWorker);
            }
          });
        });
      }).catch(err => console.warn('[Meirins] SW registration failed:', err));

      // When SW takes control, reload to get fresh content
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) { refreshing = true; window.location.reload(); }
      });
    });
  }

  // ── Install prompt (Android Chrome) ──
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    // Show our custom install button after 30s if not dismissed
    setTimeout(() => {
      if (deferredPrompt) showInstallBanner();
    }, 30000);
  });

  window.addEventListener('appinstalled', () => {
    deferredPrompt = null;
    const b = document.getElementById('meirins-install-banner');
    if (b) b.remove();
    console.log('[Meirins] App installed ✓');
  });

  // ── Update banner ──
  function showUpdateBanner(worker) {
    const banner = document.createElement('div');
    banner.id = 'meirins-update-banner';
    banner.innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;max-width:400px;margin:0 auto;">
        <span style="font-size:20px">🔄</span>
        <div style="flex:1">
          <div style="font-weight:700;font-size:13px">Actualización disponible</div>
          <div style="font-size:11px;opacity:.8;margin-top:2px">Nueva versión de Meirins lista</div>
        </div>
        <button onclick="applyUpdate()" style="padding:7px 16px;borderRadius:20px;border:none;background:white;color:#1A56DB;fontWeight:700;cursor:pointer;fontSize:12px;whiteSpace:nowrap">Actualizar</button>
        <button onclick="this.closest('#meirins-update-banner').remove()" style="background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;fontSize:18px;lineHeight:1;padding:0 4px">×</button>
      </div>`;
    Object.assign(banner.style, {
      position:'fixed',top:0,left:0,right:0,zIndex:9998,
      background:'linear-gradient(135deg,#1A56DB,#059669)',
      color:'white',padding:'12px 16px',
      boxShadow:'0 4px 20px rgba(26,86,219,.4)',
      fontFamily:"'DM Sans',sans-serif",
      animation:'slideDown .4s ease'
    });
    document.body.prepend(banner);
    window._pendingWorker = worker;
  }

  window.applyUpdate = function() {
    if (window._pendingWorker) {
      window._pendingWorker.postMessage('SKIP_WAITING');
    }
  };

  // ── Install banner (Android) ──
  function showInstallBanner() {
    if (document.getElementById('meirins-install-banner')) return;
    const banner = document.createElement('div');
    banner.id = 'meirins-install-banner';
    banner.innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;max-width:400px;margin:0 auto;">
        <img src="icon-192.png" style="width:40px;height:40px;border-radius:10px;" alt="Meirins"/>
        <div style="flex:1">
          <div style="font-weight:700;font-size:13px">Instalar Meirins</div>
          <div style="font-size:11px;opacity:.8;margin-top:1px">Añádela a tu pantalla de inicio</div>
        </div>
        <button onclick="installApp()" style="padding:7px 16px;borderRadius:20px;border:none;background:white;color:#1A56DB;fontWeight:700;cursor:pointer;fontSize:12px">Instalar</button>
        <button onclick="this.closest('#meirins-install-banner').remove()" style="background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;fontSize:18px;lineHeight:1;padding:0 4px">×</button>
      </div>`;
    Object.assign(banner.style, {
      position:'fixed',bottom:'76px',left:'8px',right:'8px',zIndex:9997,
      background:'linear-gradient(135deg,#0F1E4A,#1A56DB)',
      color:'white',padding:'12px 16px',borderRadius:'16px',
      boxShadow:'0 8px 32px rgba(15,30,74,.5)',
      fontFamily:"'DM Sans',sans-serif",
      animation:'slideUp .4s ease'
    });
    document.body.append(banner);
  }

  window.installApp = function() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(choice => {
        deferredPrompt = null;
        const b = document.getElementById('meirins-install-banner');
        if (b) b.remove();
      });
    }
  };

  // ── iOS install hint (only shown once) ──
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone;
  const shownHint = localStorage.getItem('meirins_ios_hint');
  if (isIOS && !isStandalone && !shownHint) {
    setTimeout(() => {
      const hint = document.createElement('div');
      hint.id = 'meirins-ios-hint';
      hint.innerHTML = `
        <div style="display:flex;align-items:flex-start;gap:12px;max-width:400px;margin:0 auto;">
          <img src="icon-192.png" style="width:44px;height:44px;border-radius:10px;flex-shrink:0" alt=""/>
          <div style="flex:1">
            <div style="font-weight:700;font-size:14px;margin-bottom:6px">📲 Instalar Meirins como app</div>
            <div style="font-size:12px;opacity:.85;line-height:1.6">Toca <strong>Compartir</strong> <span style="font-size:15px">⬆️</span> en Safari y luego <strong>"Añadir a pantalla de inicio"</strong> para usar Meirins como una app nativa.</div>
            <div style="display:flex;gap:8px;margin-top:10px">
              <button onclick="localStorage.setItem('meirins_ios_hint','1');this.closest('#meirins-ios-hint').remove()" style="padding:8px 16px;borderRadius:20px;border:none;background:white;color:#1A56DB;fontWeight:700;cursor:pointer;fontSize:12px">Entendido ✓</button>
              <button onclick="this.closest('#meirins-ios-hint').remove()" style="padding:8px 14px;borderRadius:20px;border:1.5px solid rgba(255,255,255,.4);background:none;color:rgba(255,255,255,.8);cursor:pointer;fontSize:12px">Ahora no</button>
            </div>
          </div>
        </div>`;
      Object.assign(hint.style, {
        position:'fixed',bottom:'80px',left:'10px',right:'10px',zIndex:9997,
        background:'linear-gradient(135deg,#0F1E4A,#1A56DB)',
        color:'white',padding:'16px',borderRadius:'20px',
        boxShadow:'0 12px 40px rgba(15,30,74,.6)',
        fontFamily:"'DM Sans',sans-serif",
        animation:'slideUp .4s ease'
      });
      document.body.append(hint);
    }, 5000);
  }
})();
</script>
