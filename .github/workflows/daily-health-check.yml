name: Daily Health Check

on:
  schedule:
    # Every day at 08:00 UTC (10:00 CET / 09:00 GMT)
    - cron: '0 8 * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  health-check:
    name: Meirins Backend Health Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run health check
        run: node scripts/health-check.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Summary on success
        if: success()
        run: echo "✅ All Meirins backend checks passed." >> $GITHUB_STEP_SUMMARY

      - name: Summary on failure
        if: failure()
        run: |
          echo "## 🚨 Meirins Health Check FAILED" >> $GITHUB_STEP_SUMMARY
          echo "Check the step logs above for details." >> $GITHUB_STEP_SUMMARY
          echo "**Action required:** review Supabase dashboard and Edge Function logs." >> $GITHUB_STEP_SUMMARY
