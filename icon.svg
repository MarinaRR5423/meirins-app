<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1E4A"/>
      <stop offset="55%" style="stop-color:#1A56DB"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#BAE6FD;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

  <!-- Subtle circle glow -->
  <circle cx="256" cy="256" r="200" fill="rgba(255,255,255,0.04)"/>
  <circle cx="256" cy="240" r="140" fill="rgba(255,255,255,0.03)"/>

  <!-- Lightning bolt ⚡ centered -->
  <path d="M295 80 L175 275 L245 275 L217 432 L345 230 L268 230 Z"
        fill="url(#bolt)"
        opacity="0.97"/>

  <!-- Subtle bottom text line -->
  <rect x="140" y="440" width="232" height="3" rx="2" fill="rgba(255,255,255,0.2)"/>
</svg>
